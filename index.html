<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <title>Calculator</title>
</head>
<body>
    <div class="calculator-body">
        <div class="calculator-display"></div>
        <div class="calculator-buttons">
            <button class="calc-clear calc-option">AC</button>
            <button class="calc-negate calc-option">&plusmn;</button>
            <button class="calc-percent calc-option">&percnt;</button>
            <button class="calc-divide calc-operator">&divide;</button>

            <button class="calc-num">7</button>
            <button class="calc-num">8</button>
            <button class="calc-num">9</button>
            <button class="calc-multiply calc-operator">&times;</button>

            <button class="calc-num">4</button>
            <button class="calc-num">5</button>
            <button class="calc-num">6</button>
            <button class="calc-minus calc-operator">&minus;</button>

            <button class="calc-num">1</button>
            <button class="calc-num">2</button>
            <button class="calc-num">3</button>
            <button class="calc-add calc-operator">&plus;</button>

            <button class="calc-num">0</button>
            <button class="calc-num calc-dot">&bull;</button>
            <button class="calc-equals calc-operator">&equals;</button>

        </div>
    </div>
</body>
</html>
