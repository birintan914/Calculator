<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="script2.js" defer></script>
    <title>Calculator</title>
</head>
<body>
    <div class="calculator-body">
        <div class="calculator-display"></div>
        <div class="calculator-buttons-container">
            <button value="AC" class="calc-btn calc-clear calc-option">AC</button>
            <button value="negate" class="calc-btn calc-negate calc-option">&plusmn;</button>
            <button value="percent" class="calc-btn calc-percent calc-option">&percnt;</button>
            <button value="divide" class="calc-btn calc-divide calc-operator">&divide;</button>

            <button value="7" class="calc-btn calc-num">7</button>
            <button value="8" class="calc-btn calc-num">8</button>
            <button value="9" class="calc-btn calc-num">9</button>
            <button value="multiply" class="calc-btn calc-multiply calc-operator">&times;</button>

            <button value="4" class="calc-btn calc-num">4</button>
            <button value="5" class="calc-btn calc-num">5</button>
            <button value="6" class="calc-btn calc-num">6</button>
            <button value="minus" class="calc-btn calc-minus calc-operator">&minus;</button>

            <button value="1" class="calc-btn calc-num">1</button>
            <button value="2" class="calc-btn calc-num">2</button>
            <button value="3" class="calc-btn calc-num">3</button>
            <button value="plus" class="calc-btn calc-add calc-operator">&plus;</button>

            <button value="0" class="calc-btn calc-num">0</button>
            <button value="." class="calc-btn calc-option calc-dot">&bull;</button>
            <button value="equals" class="calc-btn calc-equals calc-operator">&equals;</button>

        </div>
    </div>
</body>
</html>
